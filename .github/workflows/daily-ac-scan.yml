name: Daily AC Scan

on:
  # Manual trigger — paste Jira board URL or sprint ID
  workflow_dispatch:
    inputs:
      jira_board_url:
        description: >
          Jira board URL (e.g., https://ekoapp.atlassian.net/jira/software/c/projects/AE/boards/257?sprints=4077)
          Leave empty to auto-discover active sprints.
        required: false
        type: string
      sprint_id:
        description: 'Sprint ID (alternative to board URL, e.g., 4077)'
        required: false
        type: string
      mode:
        description: 'Run mode'
        required: true
        default: 'report-only'
        type: choice
        options:
          - report-only
          - dry-run
          - post
      force_repost:
        description: 'Re-post AC on tickets that already have it'
        required: false
        default: false
        type: boolean
      sprint_name_filter:
        description: 'Filter sprints by name (e.g., broccoli). Case-insensitive.'
        required: false
        default: 'broccoli'
        type: string

  # Scheduled: Mon-Fri at 09:00 Bangkok (02:00 UTC)
  schedule:
    - cron: '0 2 * * 1-5'

env:
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

jobs:
  ac-scan:
    name: Scan Sprint & Post AC
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate credentials
        run: |
          if [ -z "$JIRA_EMAIL" ] || [ -z "$JIRA_TOKEN" ]; then
            echo "::error::JIRA_EMAIL and JIRA_TOKEN secrets must be set"
            exit 1
          fi
          echo "✅ Credentials configured for $JIRA_EMAIL"

      # ── Manual trigger: use inputs ──
      # NOTE: All inputs are passed via env vars to prevent shell injection.
      # NEVER interpolate ${{ inputs.* }} directly in run: blocks.
      - name: Run AC Agent (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_BOARD_URL: ${{ inputs.jira_board_url }}
          INPUT_SPRINT_ID: ${{ inputs.sprint_id }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_FORCE: ${{ inputs.force_repost }}
          INPUT_SPRINT_FILTER: ${{ inputs.sprint_name_filter }}
        run: |
          set -euo pipefail
          ARGS=()

          # Sprint source: URL > sprint_id > auto-discover
          if [ -n "${INPUT_BOARD_URL}" ]; then
            ARGS+=(--board-url "${INPUT_BOARD_URL}")
          elif [ -n "${INPUT_SPRINT_ID}" ]; then
            ARGS+=(--sprint-id "${INPUT_SPRINT_ID}")
          else
            ARGS+=(--project AE)
          fi

          # Sprint name filter
          if [ -n "${INPUT_SPRINT_FILTER}" ]; then
            ARGS+=(--sprint-filter "${INPUT_SPRINT_FILTER}")
          fi

          # Mode
          if [ "${INPUT_MODE}" = "report-only" ]; then
            ARGS+=(--report-only)
          elif [ "${INPUT_MODE}" = "dry-run" ]; then
            ARGS+=(--dry-run)
          fi

          # Force
          if [ "${INPUT_FORCE}" = "true" ]; then
            ARGS+=(--force)
          fi

          echo "Running: python3 scripts/daily-ac-agent.py ${ARGS[*]}"
          python3 scripts/daily-ac-agent.py "${ARGS[@]}" --summary-file /tmp/ac-summary.html

      # ── Scheduled trigger: report-only (safe default) ──
      - name: Run AC Agent (scheduled)
        if: github.event_name == 'schedule'
        env:
          SPRINT_FILTER: broccoli
        run: |
          python3 scripts/daily-ac-agent.py --project AE --report-only --sprint-filter "$SPRINT_FILTER" --summary-file /tmp/ac-summary.html

      # ── Ensure summary file exists (fallback if script crashed) ──
      - name: Ensure summary file
        if: always()
        run: |
          if [ ! -f /tmp/ac-summary.html ]; then
            echo "<h2>Daily AC Scan — Failed</h2><p>The script exited before generating a summary. Check the workflow logs for errors.</p>" > /tmp/ac-summary.html
          fi

      # ── Send email report ──
      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Daily AC Scan — ${{ github.event_name }} — $(date -u '+%Y-%m-%d')"
          to: ${{ secrets.GMAIL_USER }}
          from: QA Agent <${{ secrets.GMAIL_USER }}>
          html_body: file:///tmp/ac-summary.html
          ignore_cert: false
          convert_markdown: false

      - name: Summary
        if: always()
        env:
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          echo "## Daily AC Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${INPUT_MODE:-report-only (scheduled)}" >> $GITHUB_STEP_SUMMARY
